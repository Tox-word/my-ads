<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reward Video</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-sdk.js"></script>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif;">
    <p>Загрузка рекламы...</p>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();

        // Твой актуальный Block ID
        const AdController = window.Adsgram.init({ blockId: "int-24250" }); 

        AdController.show().then((result) => {
            // Успешный досмотр
            WebApp.sendData("ad_watched");
            WebApp.close();
        }).catch((result) => {
            // Ошибка или юзер закрыл окно раньше времени
            console.error('Adsgram error:', result);
            WebApp.close();
        });
    </script>
</body>
</html>
