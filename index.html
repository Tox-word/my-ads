<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reward Video</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body style="background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh;">
    <p>Загрузка рекламы...</p>
    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();

        // Инициализация рекламы (замени blockId на свой)
        const AdController = window.Adsgram.init({ blockId: "4444" }); 

        AdController.show().then((result) => {
            // Если досмотрел - отправляем боту сигнал
            WebApp.sendData("ad_watched");
            WebApp.close();
        }).catch((result) => {
            // Если закрыл раньше или ошибка
            WebApp.close();
        });
    </script>
</body>
</html>
